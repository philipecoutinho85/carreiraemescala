<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#020302">
    <title>Carreira em Escala - A porta de entrada para uma carreira de sucesso</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link async rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        avel: {
                            green: '#00E56A',
                            dark: '#020302',
                            card: 'rgba(255, 255, 255, 0.03)',
                            border: 'rgba(255, 255, 255, 0.08)'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #020302 !important;
            color: #ffffff !important;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
        }
        .reveal-up { opacity: 0; transform: translateY(40px); transition: all 0.8s cubic-bezier(0.5, 0, 0, 1); }
        .reveal-left { opacity: 0; transform: translateX(-40px); transition: all 0.8s cubic-bezier(0.5, 0, 0, 1); }
        .reveal-right { opacity: 0; transform: translateX(40px); transition: all 0.8s cubic-bezier(0.5, 0, 0, 1); }
        .reveal-scale { opacity: 0; transform: scale(0.9); transition: all 0.8s cubic-bezier(0.5, 0, 0, 1); }
        .is-visible { opacity: 1 !important; transform: translate(0) scale(1) !important; }
        .glow-bg { position: absolute; border-radius: 50%; filter: blur(120px); z-index: 0; pointer-events: none; }
        .glow-1 { top: -10%; left: 50%; transform: translateX(-50%); width: 800px; height: 800px; background: radial-gradient(circle, rgba(0, 229, 106, 0.12) 0%, rgba(0,0,0,0) 70%); }
        .glow-2 { top: 40%; left: -20%; width: 600px; height: 600px; background: radial-gradient(circle, rgba(0, 229, 106, 0.08) 0%, rgba(0,0,0,0) 70%); }
        .aurora-wave { position: absolute; bottom: 0; right: 0; width: 100vw; height: 600px; background: radial-gradient(120% 150% at 100% 100%, rgba(0, 229, 106, 0.25) 0%, rgba(0, 229, 106, 0.05) 40%, transparent 70%), radial-gradient(100% 100% at 80% 80%, rgba(0, 229, 106, 0.15) 0%, transparent 60%); filter: blur(40px); transform: skewY(-15deg) scaleY(1.2); transform-origin: bottom right; z-index: 0; pointer-events: none; }
        .aurora-wave-mid { position: absolute; top: 50%; left: 0; width: 100vw; height: 400px; background: radial-gradient(150% 100% at 0% 50%, rgba(0, 229, 106, 0.15) 0%, transparent 60%); filter: blur(50px); transform: skewY(10deg); z-index: 0; pointer-events: none; }
        .avel-header {
            position: fixed;
            top: 25px;
            left: 0;
            right: 0;
            margin: 0 auto;
            width: calc(100% - 48px);
            max-width: 880px;
            height: 60px;
            background: linear-gradient(180deg, rgba(18, 31, 24, 0.82) 0%, rgba(10, 14, 12, 0.78) 58%, rgba(5, 7, 6, 0.74) 100%);
            backdrop-filter: blur(22px);
            -webkit-backdrop-filter: blur(22px);
            border-radius: 40px;
            border: 1px solid rgba(0, 229, 106, 0.14);
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            padding: 0 32px;
            z-index: 9999;
            overflow: hidden;
            isolation: isolate;
            box-shadow:
                0 14px 45px rgba(0,0,0,0.55),
                inset 0 1px 0 rgba(255,255,255,0.08),
                inset 0 -12px 20px rgba(0,0,0,0.30),
                0 0 0 1px rgba(0,229,106,0.04);
        }
        .avel-header::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: linear-gradient(135deg, rgba(0,229,106,0.16) 0%, rgba(0,229,106,0.05) 24%, rgba(255,255,255,0.04) 48%, rgba(0,0,0,0) 72%);
            opacity: 0.9;
            pointer-events: none;
            z-index: -1;
        }
        .avel-header::after {
            content: "";
            position: absolute;
            left: 8%;
            top: -65%;
            width: 42%;
            height: 180%;
            border-radius: 999px;
            background: radial-gradient(circle, rgba(0,229,106,0.18) 0%, rgba(0,229,106,0.07) 38%, rgba(0,229,106,0) 72%);
            filter: blur(22px);
            pointer-events: none;
            z-index: -1;
        }
        .avel-logo { font-weight: 800; font-size: 16px; color: #fff; letter-spacing: -0.5px; white-space: nowrap; grid-column: 1; justify-self: start; text-shadow: 0 1px 10px rgba(0,0,0,0.25); }
        .avel-logo span { color: #00E56A; text-shadow: 0 0 14px rgba(0,229,106,0.28); }
        .avel-nav { display: none; }
        @media (min-width: 768px) {
            .avel-nav { display: flex; gap: 32px; grid-column: 2; justify-self: center; }
            .avel-nav a { color: #b3bbb5; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; text-decoration: none; transition: color 0.3s ease, text-shadow 0.3s ease, transform 0.3s ease; text-shadow: 0 1px 8px rgba(0,0,0,0.2); }
            .avel-nav a:hover { color: #c8ffd9; text-shadow: 0 0 12px rgba(0,229,106,0.32); transform: translateY(-1px); }
        }
        @media (max-width: 767px) {
            .avel-header { display: flex; justify-content: center; }
            .avel-logo { grid-column: unset; justify-self: center; }
        }
        .mobile-bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 65px; background: rgba(8, 8, 8, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid rgba(255, 255, 255, 0.05); display: flex; justify-content: space-around; align-items: center; z-index: 9999; padding-bottom: env(safe-area-inset-bottom); }
        @media (min-width: 768px) { .mobile-bottom-nav { display: none; } }
        .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; color: #6b7280; font-size: 10px; gap: 4px; text-decoration: none; transition: color 0.3s ease; width: 25%; }
        .nav-item.active, .nav-item:hover { color: #00E56A; }
        .nav-item i { font-size: 20px; margin-bottom: 2px; }
        h1, h2, h3 { color: #ffffff; font-weight: 700; letter-spacing: -1px; }
        p { color: #9ca3af; line-height: 1.6; }
        .btn-avel { background-color: #00E56A; color: #000; padding: 14px 32px; border-radius: 30px; font-weight: 700; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; display: inline-block; transition: all 0.3s ease; text-decoration: none; border: none; box-shadow: 0 4px 20px rgba(0, 229, 106, 0.2); -webkit-user-select: none; user-select: none; cursor: pointer; }
        .btn-avel:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0, 229, 106, 0.4); color: #000; text-decoration: none; }
        .card-avel { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); transition: all 0.4s ease; position: relative; overflow: hidden; }
        .card-avel:hover { border-color: rgba(0, 229, 106, 0.4); background: rgba(255, 255, 255, 0.05); transform: translateY(-5px); }
        .glass-testimonial { background: linear-gradient(135deg, rgba(25, 25, 25, 0.4) 0%, rgba(10, 10, 10, 0.7) 100%); backdrop-filter: blur(24px) saturate(200%); -webkit-backdrop-filter: blur(24px) saturate(200%); border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.08); border-top: 1px solid rgba(255, 255, 255, 0.3); border-left: 1px solid rgba(255, 255, 255, 0.15); box-shadow: 0 20px 40px rgba(0,0,0,0.6), inset 0 2px 15px rgba(255, 255, 255, 0.1); }
        .social-info { padding: 120px 0; position: relative; z-index: 10; }
        .orbit-circle { position: relative; width: 200px; height: 200px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px auto; }
        .orbit-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: rotate(-15deg); }
        .orbit-circle h3 { font-size: 42px; font-weight: 800; color: #00E56A; margin: 0; position: relative; z-index: 2; letter-spacing: -2px; text-shadow: 0 0 20px rgba(0, 229, 106, 0.3); }
        @media (max-width: 768px) { body { padding-bottom: 65px; } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="./app.js"></script>
</body>
</html>
